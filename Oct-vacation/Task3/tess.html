<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
          background-color: #f0f0f0;
          display: flex;
          justify-content: center;
          align-items: center;
          height: 100vh;
        }
    
       .calculator {
          background-color: #333;
          padding: 10px;
          border-radius: 10px;
          box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }
    
       .display {
          background-color: #444;
          color: white;
          font-size: 24px;
          padding: 10px;
          margin-bottom: 10px;
          border-radius: 5px;
          text-align: right;
          display: grid;
          grid-template-columns: repeat(4, 1fr);
          /* 设置为 4 列，每列宽度相等 */
          grid-gap: 5px;
        }
    
       .button {
          background-color: #555;
          color: white;
          border: none;
          padding: 2px;
          font-size: 22px;
          margin: 5px;
          border-radius: 5px;
          cursor: pointer;
        }
    
       .button:hover {
          background-color: #777;
        }
    
        /* 显示模块 */
       .left-aligned-text {
          text-align: right;
          width: 260px;
          /* 设置一个固定宽度，以便更好地观察左对齐效果 */
          height: 10px;
          margin-bottom: 10px;
          background-color: #0a8a3b;
          padding: 20px;
          font-size: 22px;
          color: black;
        }
      </style>
    </head>
    
    <body>
      <div class="calculator">
        <div class="left-aligned-text"></div>
        <div class="display" id="display">
          <div></div>
          <button class="button" id="clear">C</button>
          <button class="button" id="backspace">←</button>
          <button class="button" id="divide">÷</button>
          <button class="button" id="seven">7</button>
          <button class="button" id="eight">8</button>
          <button class="button" id="nine">9</button>
          <button class="button" id="multiply">×</button>
          <button class="button" id="four">4</button>
          <button class="button" id="five">5</button>
          <button class="button" id="six">6</button>
          <button class="button" id="subtract">-</button>
          <button class="button" id="one">1</button>
          <button class="button" id="two">2</button>
          <button class="button" id="three">3</button>
          <button class="button" id="add">+</button>
          <button class="button" id="zero">0</button>
          <button class="button" id="dot">.</button>
          <button class="button" id="equals">=</button>
        </div>
      </div>
      <script>
        const buttons = document.querySelectorAll('.button');
        const display = document.getElementById('left-aligned-text');
        const equalsButton = document.getElementById('equals');
    
        buttons.forEach(button => {
          button.addEventListener('click', () => {
            if (button.id === 'clear') {
              display.textContent = '';
            } else if (button.id === 'backspace') {
              display.textContent = display.textContent.slice(0, -1);
            } else if (button.id === 'equals') {
              const value = display.textContent;
              handleValue(value);
              // 这里可以添加更多对结果的处理逻辑
            } else {
              display.textContent += button.textContent;
            }
          });
        });
    
        function handleValue(value) {
          // 这里是处理传递过来的值的函数
          console.log('传递过来的值：', value);
        }
      </script>
    </body>
    
    </html>
